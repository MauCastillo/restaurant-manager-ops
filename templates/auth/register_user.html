{% extends "base.html" %}
{% block title %}Registrar Nuevo Usuario - HexOPS Manager{% endblock %}

{% block content %}
<div style="max-width: 520px; margin: 1.5rem auto;">
    <div class="page-header" style="margin-bottom: 1.5rem;">
        <div>
            <h1 class="page-title" style="font-size: 1.8rem;">Crear Cuenta de Seguridad</h1>
            <p class="page-subtitle">Agregar un nuevo operador o administrador al sistema.</p>
        </div>
        <a href="{{ url_for('auth.users_list') }}" class="btn btn-outline btn-sm">← Volver</a>
    </div>

    <div class="glass-card">
        <form method="POST" action="{{ url_for('auth.register_user') }}">
            <div class="form-group">
                <label class="form-label" for="username">Nombre de Usuario</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="ej. carlos_operador" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="carlos@empresa.com" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Contraseña Segura</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Mínimo 8 caracteres" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="role">Rol de Seguridad</label>
                <select id="role" name="role" class="form-control">
                    <option value="operator">Operador (Gestiona clientes y compras)</option>
                    <option value="admin">Administrador (Control total y usuarios)</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Guardar Cuenta y Encriptar</button>
        </form>
    </div>
</div>
{% endblock %}
