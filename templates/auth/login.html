{% extends "base.html" %}
{% block title %}Iniciar Sesión - HexOPS Manager{% endblock %}

{% block content %}
<div style="max-width: 440px; margin: 3rem auto;">
    <div class="glass-card">
        <div style="text-align:center; margin-bottom: 2rem;">
            <div class="brand-icon" style="margin: 0 auto 1rem; width: 56px; height: 56px; font-size: 1.8rem;">🔐</div>
            <h1 class="page-title" style="font-size: 1.8rem;">Acceso de Operadores</h1>
            <p class="page-subtitle">Sistema de Control de Clientes & Compras</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label class="form-label" for="username">Usuario</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="ej. admin" required autofocus>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Contraseña</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Ingresar al Sistema</button>
        </form>

        <div style="margin-top: 1.5rem; text-align: center; font-size: 0.85rem; color: var(--text-muted);">
            <p>Credenciales por defecto: <strong style="color:var(--text-secondary)">admin / admin123</strong></p>
        </div>
    </div>
</div>
{% endblock %}
